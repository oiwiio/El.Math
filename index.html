<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор кубических уравнений</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }
        .calculator {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 700px;
            width: 100%;
        }
        h1 {
            margin: 0 0 8px 0;
            font-size: 28px;
            color: #1a1a1a;
        }
        .subtitle {
            color: #666;
            margin-bottom: 24px;
            font-size: 15px;
            border-left: 3px solid #4361ee;
            padding-left: 12px;
        }
        .equation {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            text-align: center;
            font-size: 24px;
            font-weight: 500;
            font-family: monospace;
            word-break: break-word;
        }
        .coeff-grid {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .coeff-item {
            flex: 1;
            min-width: 120px;
        }
        .coeff-item label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .coeff-item input {
            width: 100%;
            padding: 14px 16px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            transition: 0.2s;
            background: white;
        }
        .coeff-item input:focus {
            border-color: #4361ee;
            outline: none;
            box-shadow: 0 0 0 3px rgba(67,97,238,0.2);
        }
        .examples {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .example-btn {
            background: #edf2f7;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: #2d3748;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .example-btn:hover {
            background: #e2e8f0;
            border-color: #4361ee;
        }
        .solve-btn {
            width: 100%;
            background: #4361ee;
            color: white;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 25px;
        }
        .solve-btn:hover {
            background: #3a56d4;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(67,97,238,0.3);
        }
        .results {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
        }
        .results h3 {
            margin: 0 0 15px 0;
            color: #333;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .roots {
            display: grid;
            gap: 12px;
        }
        .root-item {
            background: white;
            padding: 15px 18px;
            border-radius: 14px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 18px;
            border: 1px solid #e9e9e9;
            display: flex;
            align-items: center;
        }
        .root-label {
            font-weight: 600;
            color: #4361ee;
            margin-right: 15px;
            min-width: 35px;
        }
        .root-value {
            word-break: break-word;
            color: #1a1a1a;
        }
        .error {
            background: #fff5f5;
            color: #c53030;
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid #c53030;
        }
        .note {
            font-size: 13px;
            color: #718096;
            margin-top: 15px;
            text-align: center;
        }
    </style>
    <!-- Подключаем math.js для работы с комплексными числами -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.7.0/math.min.js"></script>
</head>
<body>
<div class="calculator">
    <h1>Решение кубических уравнений</h1>
    <div class="subtitle">a·x³ + b·x² + c·x + d = 0 — комплексные корни</div>
    
    <div class="equation" id="eq-display">x³ - 6x² + 11x - 6 = 0</div>
    
    <div class="coeff-grid">
        <div class="coeff-item">
            <label>a (x³)</label>
            <input type="text" id="coeff-a" placeholder="1" value="1">
        </div>
        <div class="coeff-item">
            <label>b (x²)</label>
            <input type="text" id="coeff-b" placeholder="-6" value="-6">
        </div>
        <div class="coeff-item">
            <label>c (x)</label>
            <input type="text" id="coeff-c" placeholder="11" value="11">
        </div>
        <div class="coeff-item">
            <label>d (const)</label>
            <input type="text" id="coeff-d" placeholder="-6" value="-6">
        </div>
    </div>
    
    <div class="examples">
        <button class="example-btn" data-a="1" data-b="-6" data-c="11" data-d="-6">(x-1)(x-2)(x-3)</button>
        <button class="example-btn" data-a="1" data-b="0" data-c="0" data-d="1">x³ + 1 = 0</button>
        <button class="example-btn" data-a="1" data-b="0" data-c="0" data-d="-8">x³ - 8 = 0</button>
        <button class="example-btn" data-a="1" data-b="-3" data-c="3" data-d="-1">(x-1)³</button>
        <button class="example-btn" data-a="1" data-b="1" data-c="1" data-d="1">x³+x²+x+1=0</button>
        <button class="example-btn" data-a="1" data-b="0" data-c="1" data-d="0">x³ + x = 0</button>
    </div>
    
    <button class="solve-btn" id="solve-btn">Решить уравнение</button>
    
    <div class="results" id="results">
        <h3>Корни уравнения</h3>
        <div class="roots" id="roots-container">
            <div class="root-item"><span class="root-label">x₁</span><span class="root-value" id="root1">—</span></div>
            <div class="root-item"><span class="root-label">x₂</span><span class="root-value" id="root2">—</span></div>
            <div class="root-item"><span class="root-label">x₃</span><span class="root-value" id="root3">—</span></div>
        </div>
        <div class="note" id="verification"></div>
    </div>
</div>

<script>
// функция для форматирования комплексного числа
function formatComplex(z) {
    if (typeof z === 'number') {
        // если число целое, показываем без десятичных
        if (Number.isInteger(z)) return z.toString();
        return z.toFixed(6).replace(/\.?0+$/, '');
    }
    
    // если z - комплексное число от math.js
    let re, im;
    if (z && typeof z === 'object') {
        re = math.re(z);
        im = math.im(z);
    } else {
        re = z;
        im = 0;
    }
    
    // если мнимая часть близка к нулю
    if (Math.abs(im) < 1e-10) {
        if (Number.isInteger(re)) return re.toString();
        return re.toFixed(6).replace(/\.?0+$/, '');
    }
    
    // форматируем действительную часть
    let reStr;
    if (Math.abs(re) < 1e-10) {
        reStr = '';
    } else {
        reStr = Number.isInteger(re) ? re.toString() : re.toFixed(6).replace(/\.?0+$/, '');
    }
    
    // форматируем мнимую часть
    let imStr = Math.abs(im).toFixed(6).replace(/\.?0+$/, '');
    if (imStr === '' || imStr === '0') imStr = '1';
    
    const sign = im >= 0 ? '+' : '-';
    
    if (reStr === '') {
        return `${sign} ${imStr}i`.trim();
    }
    return `${reStr} ${sign} ${imStr}i`;
}

// парсинг ввода с поддержкой комплексных чисел
function parseCoefficient(str) {
    if (!str || str.trim() === '') return 0;
    try {
        // заменяем запятые на точки
        str = str.replace(/,/g, '.');
        // заменяем i на j (math.js использует j для мнимой единицы)
        str = str.replace(/i/g, 'j');
        // парсим с помощью math.js
        return math.evaluate(str);
    } catch (e) {
        console.warn('Parse error:', e);
        return 0;
    }
}

// обновление отображения уравнения
function updateEquation() {
    const a = parseCoefficient(document.getElementById('coeff-a').value);
    const b = parseCoefficient(document.getElementById('coeff-b').value);
    const c = parseCoefficient(document.getElementById('coeff-c').value);
    const d = parseCoefficient(document.getElementById('coeff-d').value);
    
    const formatTerm = (coeff, power) => {
        if (math.abs(coeff) < 1e-10) return '';
        
        let coeffStr;
        if (typeof coeff === 'number') {
            if (Math.abs(coeff - 1) < 1e-10) coeffStr = '';
            else if (Math.abs(coeff + 1) < 1e-10) coeffStr = '-';
            else coeffStr = coeff.toFixed(2);
        } else {
            coeffStr = formatComplex(coeff);
        }
        
        return coeffStr + power;
    };
    
    const terms = [
        formatTerm(a, 'x³'),
        formatTerm(b, 'x²'),
        formatTerm(c, 'x'),
        formatTerm(d, '')
    ].filter(t => t !== '');
    
    let equation = terms.join(' + ').replace(/\+ -/g, '- ');
    if (equation === '') equation = '0';
    document.getElementById('eq-display').textContent = equation + ' = 0';
}

// решение кубического уравнения
function solveCubic(a, b, c, d) {
    // приводим к комплексным числам
    a = math.complex(a);
    b = math.complex(b);
    c = math.complex(c);
    d = math.complex(d);
    
    if (math.abs(a) < 1e-10) {
        throw new Error('Коэффициент a не может быть нулевым');
    }
    
    // нормализация: делим на a
    const A = math.divide(b, a);
    const B = math.divide(c, a);
    const C = math.divide(d, a);
    
    // замена переменной x = y - A/3
    const p = math.subtract(B, math.divide(math.multiply(A, A), 3));
    const q = math.add(
        math.divide(math.multiply(2, math.multiply(A, A), A), 27),
        math.subtract(C, math.divide(math.multiply(A, B), 3))
    );
    
    // дискриминант
    const D = math.add(
        math.multiply(q/2, q/2),
        math.multiply(p/3, p/3, p/3)
    );
    
    // кубические корни через полярную форму
    function cubeRoot(z) {
        const r = math.abs(z);
        const arg = math.arg(z);
        const r3 = Math.pow(r, 1/3);
        return math.complex(
            r3 * Math.cos(arg / 3),
            r3 * Math.sin(arg / 3)
        );
    }
    
    const sqrtD = math.sqrt(D);
    const u = cubeRoot(math.add(-q/2, sqrtD));
    const v = cubeRoot(math.subtract(-q/2, sqrtD));
    
    // комплексные корни из единицы
    const omega = math.complex(-0.5, Math.sqrt(3)/2);
    const omega2 = math.complex(-0.5, -Math.sqrt(3)/2);
    
    // три корня для y
    const y = [
        math.add(u, v),
        math.add(math.multiply(u, omega), math.multiply(v, omega2)),
        math.add(math.multiply(u, omega2), math.multiply(v, omega))
    ];
    
    // возврат к x = y - A/3
    const shift = math.divide(A, 3);
    return y.map(yi => math.subtract(yi, shift));
}

// основная функция решения
function solve() {
    try {
        const a = parseCoefficient(document.getElementById('coeff-a').value);
        const b = parseCoefficient(document.getElementById('coeff-b').value);
        const c = parseCoefficient(document.getElementById('coeff-c').value);
        const d = parseCoefficient(document.getElementById('coeff-d').value);
        
        console.log('Solving:', {a, b, c, d});
        
        const roots = solveCubic(a, b, c, d);
        
        console.log('Roots:', roots);
        
        // отображаем корни
        document.getElementById('root1').textContent = formatComplex(roots[0]);
        document.getElementById('root2').textContent = formatComplex(roots[1]);
        document.getElementById('root3').textContent = formatComplex(roots[2]);
        
        // проверка (подстановка)
        const check1 = math.abs(math.add(
            math.multiply(a, math.pow(roots[0], 3)),
            math.multiply(b, math.pow(roots[0], 2)),
            math.multiply(c, roots[0]),
            d
        ));
        
        const check2 = math.abs(math.add(
            math.multiply(a, math.pow(roots[1], 3)),
            math.multiply(b, math.pow(roots[1], 2)),
            math.multiply(c, roots[1]),
            d
        ));
        
        const check3 = math.abs(math.add(
            math.multiply(a, math.pow(roots[2], 3)),
            math.multiply(b, math.pow(roots[2], 2)),
            math.multiply(c, roots[2]),
            d
        ));
        
        const maxError = Math.max(check1, check2, check3);
        
        document.getElementById('verification').innerHTML = 
            maxError < 1e-7 ? 
            '✓ Все корни найдены (погрешность < 10⁻⁷)' : 
            `⚠ Погрешность: ${maxError.toExponential(2)}`;
            
    } catch (err) {
        console.error('Error:', err);
        document.getElementById('root1').textContent = '—';
        document.getElementById('root2').textContent = '—';
        document.getElementById('root3').textContent = '—';
        document.getElementById('verification').innerHTML = 
            `<span style="color: #c53030">❌ Ошибка: ${err.message}</span>`;
    }
}

// инициализация
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.coeff-item input').forEach(input => {
        input.addEventListener('input', updateEquation);
    });
    
    document.querySelectorAll('.example-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.getElementById('coeff-a').value = btn.dataset.a;
            document.getElementById('coeff-b').value = btn.dataset.b;
            document.getElementById('coeff-c').value = btn.dataset.c;
            document.getElementById('coeff-d').value = btn.dataset.d;
            updateEquation();
            solve();
        });
    });
    
    document.getElementById('solve-btn').addEventListener('click', solve);
    
    // начальный расчёт
    updateEquation();
    solve();
});
</script>
</body>
</html>
